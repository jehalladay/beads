# forge.toml — Forge package manifest for beads (bd).
#
# This file registers beads in the Forge workspace so that
# `forge build/test/lint/check` resolve a real target. See AGENT_INSTRUCTIONS.md
# and the Makefile for the authoritative build contract.
#
# SCOPE (beads-r06.1 / A1): declare the package + backend so `forge` resolves
# beads. beads-r06.2 (A2) maps forge's build/test/lint/check onto the real
# gms_pure_go + version-stamped-ldflags build (so `forge build` == the canonical
# gate) via [build.commands] below — ACTIVE as of the forge>=0.2.1 pin.
#
# ⚠️ REQUIRES forge >= 0.2.1 (tag v0.2.1, commit 75857ff).
# The go backend honors [build.commands] overrides only as of forge 0.2.1
# (FB-series command_runner.py: go_backend routes every verb through
# run_command + run_custom, consulting ctx.command_overrides and
# ctx.default_timeout; emit ERROR -> typer.Exit(1) so a failed override fails
# the build). On forge 0.2.0 the go backend SILENTLY ignores [build.commands]
# and runs a bare `go build ./...` (beads-2hk) — so an older forge would run an
# un-gated build. This is NOT a merge-safety regression: the canonical gate
# (scripts/ci/forge-gate.sh) is enforced independently by the git pre-push hook
# and CI, both of which shell out to that script directly (not via forge). The
# forge>=0.2.1 pin is what makes `forge build` ALSO be that same gate.
# Forge has no enforced min-version manifest field, so this requirement is
# documented here and locked behaviorally by scripts/forge_gate_test.go.

[package]
name = "beads"
type = "code"
version = "1.1.0-rc.1"
language = "go"
description = "bd — dependency-aware issue tracker backed by Dolt (github.com/jehalladay/beads)"

[build]
backend = "go"

# [build.commands] — map forge's verbs onto the real beads build contract
# (BUILD_TAGS=gms_pure_go, CGO_ENABLED=1, version-stamped ldflags) so
# CI == forge == local by construction. Requires forge >= 0.2.1 (see header).
#
# OWNERSHIP (shared table; keys are non-overlapping):
#   - build/test/lint/check  → beads-r06.2 (A2)
#   - release/package        → beads-r06.7: the release + cross-compile path.
#     `release`/`package` run the version-stamped host-platform release build
#     (`make release-build`); the full cross-platform matrix is cut by
#     GoReleaser + the goreleaser-macos CI job in .github/workflows/release.yml.
[build.commands]
# --- beads-r06.2 (A2): build/test/lint/check → the canonical gate ------------
# `forge build` IS scripts/ci/forge-gate.sh — the single source of truth for the
# "forge build GREEN" gate (CGO_ENABLED=1, -tags gms_pure_go, version-stamped
# ldflags, pure-Go compile, cross-compile). It asserts the emitted binary is the
# *tagged* build, so a bare `go build ./...` (no tags/ldflags) cannot masquerade
# as green. The git pre-push hook and CI invoke this SAME script, so there is no
# drift. Cold build (~175s) + pure-Go + cross-compile can exceed the 300s
# default, so give it explicit headroom via the table form (forge 0.2.1 honors a
# per-command timeout).
build = { command = "scripts/ci/forge-gate.sh", timeout = 600 }
test  = "make test"
lint  = "make ci-pr-lint"
check = "go vet -tags gms_pure_go ./..."

# --- beads-r06.7: release + cross-compile path -------------------------------
# Version-stamped host-platform release build (mirrors GoReleaser ldflags).
release = "make release-build"
# Package == the release build artifact; the distributable archives are
# assembled by GoReleaser in CI.
package = "make release-build"
